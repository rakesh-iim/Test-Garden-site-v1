<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Expert landscape designers providing premium landscape design and estate management services. Crafting lush, high-end environments, botanical gardens, and sustainable outdoor spaces." />
    <meta name="keywords" content="premium landscape design, estate management services, corporate landscaping, structural hardscaping, seasonal cleanup, nature architecture" />
    <meta name="author" content="MrGardenr" />
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="MrGardenr - Premium Landscape Design & Estate Management" />
    <meta property="og:description" content="Expert landscape designers providing premium landscape design and estate management services. Crafting lush, high-end environments, botanical gardens, and sustainable outdoor spaces." />
    <meta property="og:type" content="website" />
    <!-- Replace this with your actual production URL -->
    <meta property="og:url" content="https://mrgardenr.com" />
    <meta property="og:image" content="/logo.png" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MrGardenr - Premium Landscape Design & Estate Management" />
    <meta name="twitter:description" content="Expert landscape designers providing premium landscape design and estate management services. Crafting lush, high-end environments, botanical gardens, and sustainable outdoor spaces." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Preconnect to font servers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload hero image for fast LCP -->
    <link rel="preload" as="image" href="/images/hero-main.webp" type="image/webp" fetchpriority="high">
    
    <!-- Non-render-blocking font loading -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:wght@400;500;600;700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:wght@400;500;600;700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:wght@400;500;600;700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet"></noscript>
    
    <title>MrGardenr - Premium Landscape Design</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/Favicon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/Favicon.png" />
    <link rel="apple-touch-icon" href="/Favicon.png" />
  </head>
  <body>
    <div id="root">
      <!-- Static hero shell for instant LCP — React overwrites this on mount -->
      <div id="hero-shell" style="position:relative;min-height:90vh;display:flex;align-items:center;overflow:hidden;background:#0b1612;">
        <img src="/images/hero-main.webp" alt="Lush garden" fetchpriority="high" decoding="async" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.6;" />
        <div style="position:absolute;inset:0;background:linear-gradient(to right,#f5f2eb,rgba(245,242,235,0.8),rgba(0,0,0,0.4));"></div>
        <div style="position:relative;z-index:10;max-width:1600px;margin:0 auto;padding:5rem 1.5rem 0;">
          <span style="display:inline-block;background:#acedda;color:#2e6d5f;font-size:0.75rem;font-weight:700;padding:0.375rem 1rem;border-radius:9999px;margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:0.05em;font-family:Inter,system-ui,sans-serif;">Premium Landscaping Services</span>
          <h1 style="font-size:clamp(3rem,5vw,4.5rem);font-weight:800;color:#1c1b1f;margin-bottom:1.5rem;line-height:1.1;font-family:Playfair Display,serif;">Crafting Nature's<br><span style="color:#5BA585;">Masterpieces</span></h1>
          <p style="font-size:clamp(1.125rem,2vw,1.25rem);color:#49454f;max-width:36rem;line-height:1.7;font-family:Inter,system-ui,sans-serif;font-weight:500;">Transform your outdoor space into a vibrant, high-energy sanctuary. We blend professional precision with organic vitality to create tropical environments that breathe.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
